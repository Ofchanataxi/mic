services:
  postgres:
    image: postgres:16-alpine
    container_name: mic-postgres
    environment:
      POSTGRES_DB: media_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mic-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gcs-emulator:
    image: fsouza/fake-gcs-server:1.52.2
    container_name: mic-gcs-emulator
    command: ["-scheme", "http", "-port", "4443", "-public-host", "gcs-emulator"]
    ports:
      - "4443:4443"
    volumes:
      - gcs_data:/data

  media-service:
    build:
      context: ./media-service
    container_name: mic-media-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gcs-emulator:
        condition: service_started
    env_file:
      - ./media-service/.env.example
    environment:
      PORT: 3000
      NODE_ENV: development
      SERVICE_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=public
      REDIS_URL: redis://redis:6379
      GCS_PROJECT_ID: local-media-project
      GCS_BUCKET_NAME: media-assets
      GCS_EMULATOR_HOST: http://gcs-emulator:4443
      TEMP_UPLOAD_DIR: /app/tmp/uploads
    ports:
      - "3000:3000"
    volumes:
      - ./media-service:/app
      - /app/node_modules
      - /app/src/prisma/generated
      - temp_uploads:/app/tmp/uploads
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  media-worker:
    build:
      context: ./media-service
    container_name: mic-media-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gcs-emulator:
        condition: service_started
    env_file:
      - ./media-service/.env.example
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=public
      REDIS_URL: redis://redis:6379
      GCS_PROJECT_ID: local-media-project
      GCS_BUCKET_NAME: media-assets
      GCS_EMULATOR_HOST: http://gcs-emulator:4443
      TEMP_UPLOAD_DIR: /app/tmp/uploads
      SERVICE_BASE_URL: http://localhost:3000
    volumes:
      - ./media-service:/app
      - /app/node_modules
      - /app/src/prisma/generated
      - temp_uploads:/app/tmp/uploads
    command: sh -c "npx prisma generate && npm run worker"

  candidate-service:
    build:
      context: ./candidate-service
    container_name: mic-candidate-service
    depends_on:
      postgres:
        condition: service_healthy
      media-service:
        condition: service_started
    env_file:
      - ./candidate-service/.env.example
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=candidate
      MEDIA_SERVICE_URL: http://media-service:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SOFT_SKILLS_LIMIT: ${SOFT_SKILLS_LIMIT:-5}
      ADAPTIVE_WEAK_SCORE_THRESHOLD: ${ADAPTIVE_WEAK_SCORE_THRESHOLD:-60}
      ADAPTIVE_COVERAGE_RATIO: ${ADAPTIVE_COVERAGE_RATIO:-0.7}
      ADAPTIVE_REINFORCEMENT_RATIO: ${ADAPTIVE_REINFORCEMENT_RATIO:-0.3}
      ADAPTIVE_SOFT_SKILLS_RATIO: ${ADAPTIVE_SOFT_SKILLS_RATIO:-0.3}
      ADAPTIVE_MAX_CONSECUTIVE_SAME_TOPIC: ${ADAPTIVE_MAX_CONSECUTIVE_SAME_TOPIC:-1}
    ports:
      - "3001:3001"
    volumes:
      - ./candidate-service:/app
      - /app/node_modules
      - /app/src/prisma/generated
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  auth-service:
    build:
      context: ./auth-service
    container_name: mic-auth-service
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./auth-service/.env.example
    environment:
      PORT: 3005
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=auth
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-mic-auth-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-mic-platform}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123456}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-MIC}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3005:3005"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
      - /app/src/prisma/generated
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  interview-service:
    build:
      context: ./interview-service
    container_name: mic-interview-service
    depends_on:
      postgres:
        condition: service_healthy
      candidate-service:
        condition: service_started
    env_file:
      - ./interview-service/.env.example
    environment:
      PORT: 3002
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=interview
      CANDIDATE_SERVICE_URL: http://candidate-service:3001
      EVALUATION_SERVICE_URL: http://evaluation-service:3003
      ENABLE_EVALUATION_DISPATCH: ${ENABLE_EVALUATION_DISPATCH:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_QUESTION_MODEL: ${OPENAI_QUESTION_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DEFAULT_QUESTION_COUNT: ${DEFAULT_QUESTION_COUNT:-8}
      MIN_QUESTION_COUNT: ${MIN_QUESTION_COUNT:-5}
      MAX_QUESTION_COUNT: ${MAX_QUESTION_COUNT:-12}
      QUESTION_GENERATION_MAX_ATTEMPTS: ${QUESTION_GENERATION_MAX_ATTEMPTS:-3}
      QUESTION_SIMILARITY_THRESHOLD: ${QUESTION_SIMILARITY_THRESHOLD:-0.85}
    ports:
      - "3002:3002"
    volumes:
      - ./interview-service:/app
      - /app/node_modules
      - /app/src/prisma/generated
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  evaluation-service:
    build:
      context: ./evaluation-service
    container_name: mic-evaluation-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      media-service:
        condition: service_started
      candidate-service:
        condition: service_started
      interview-service:
        condition: service_started
    environment:
      PORT: 3003
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=evaluation
      REDIS_URL: redis://redis:6379
      EVALUATION_QUEUE_NAME: evaluation-jobs
      MAX_EVALUATION_ATTEMPTS: 3
      INTERVIEW_SERVICE_URL: http://interview-service:3002
      MEDIA_SERVICE_URL: http://media-service:3000
      CANDIDATE_SERVICE_URL: http://candidate-service:3001
      FEEDBACK_SERVICE_URL: http://feedback-service:3004
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY:-}
      JUDGE0_API_URL: ${JUDGE0_API_URL:-https://judge0-ce.p.rapidapi.com}
      JUDGE0_API_HOST: ${JUDGE0_API_HOST:-judge0-ce.p.rapidapi.com}
      TEMP_PROCESSING_DIR: /app/tmp/evaluation
      TECHNICAL_SEMANTIC_WEIGHT: 0.8
      TECHNICAL_AUDIO_WEIGHT: 0.2
      TECHNICAL_VIDEO_WEIGHT: 0.0
      SOFT_SEMANTIC_WEIGHT: 0.7
      SOFT_AUDIO_WEIGHT: 0.3
      SOFT_VIDEO_WEIGHT: 0.0
      CODE_CODE_WEIGHT: 0.8
      CODE_SEMANTIC_WEIGHT: 0.2
      ALLOW_COMPLETED_REPROCESS: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    ports:
      - "3003:3003"
    volumes:
      - ./evaluation-service:/app
      - /app/node_modules
      - evaluation_tmp:/app/tmp/evaluation
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  evaluation-worker:
    build:
      context: ./evaluation-service
    container_name: mic-evaluation-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      media-service:
        condition: service_started
      candidate-service:
        condition: service_started
      interview-service:
        condition: service_started
    environment:
      PORT: 3003
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=evaluation
      REDIS_URL: redis://redis:6379
      EVALUATION_QUEUE_NAME: evaluation-jobs
      MAX_EVALUATION_ATTEMPTS: 3
      INTERVIEW_SERVICE_URL: http://interview-service:3002
      MEDIA_SERVICE_URL: http://media-service:3000
      CANDIDATE_SERVICE_URL: http://candidate-service:3001
      FEEDBACK_SERVICE_URL: http://feedback-service:3004
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY:-}
      JUDGE0_API_URL: ${JUDGE0_API_URL:-https://judge0-ce.p.rapidapi.com}
      JUDGE0_API_HOST: ${JUDGE0_API_HOST:-judge0-ce.p.rapidapi.com}
      TEMP_PROCESSING_DIR: /app/tmp/evaluation
      TECHNICAL_SEMANTIC_WEIGHT: 0.8
      TECHNICAL_AUDIO_WEIGHT: 0.2
      TECHNICAL_VIDEO_WEIGHT: 0.0
      SOFT_SEMANTIC_WEIGHT: 0.7
      SOFT_AUDIO_WEIGHT: 0.3
      SOFT_VIDEO_WEIGHT: 0.0
      CODE_CODE_WEIGHT: 0.8
      CODE_SEMANTIC_WEIGHT: 0.2
      ALLOW_COMPLETED_REPROCESS: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    volumes:
      - ./evaluation-service:/app
      - /app/node_modules
      - evaluation_tmp:/app/tmp/evaluation
    command: sh -c "npx prisma generate && npm run worker"

  feedback-service:
    build:
      context: ./feedback-service
    container_name: mic-feedback-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evaluation-service:
        condition: service_started
    environment:
      PORT: 3004
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=feedback
      REDIS_URL: redis://redis:6379
      FEEDBACK_QUEUE_NAME: feedback-jobs
      MAX_FEEDBACK_ATTEMPTS: 3
      EVALUATION_SERVICE_URL: http://evaluation-service:3003
      CANDIDATE_SERVICE_URL: http://candidate-service:3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ALLOW_READY_REPORT_REGENERATION: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    ports:
      - "3004:3004"
    volumes:
      - ./feedback-service:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  feedback-worker:
    build:
      context: ./feedback-service
    container_name: mic-feedback-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evaluation-service:
        condition: service_started
    environment:
      PORT: 3004
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=feedback
      REDIS_URL: redis://redis:6379
      FEEDBACK_QUEUE_NAME: feedback-jobs
      MAX_FEEDBACK_ATTEMPTS: 3
      EVALUATION_SERVICE_URL: http://evaluation-service:3003
      CANDIDATE_SERVICE_URL: http://candidate-service:3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ALLOW_READY_REPORT_REGENERATION: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    volumes:
      - ./feedback-service:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run worker"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: mic-api-gateway
    depends_on:
      auth-service:
        condition: service_started
      media-service:
        condition: service_started
      candidate-service:
        condition: service_started
      interview-service:
        condition: service_started
      evaluation-service:
        condition: service_started
      feedback-service:
        condition: service_started
    env_file:
      - ./api-gateway/.env.example
    environment:
      PORT: 8080
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-mic-auth-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-mic-platform}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      AUTH_SERVICE_URL: http://auth-service:3005
      MEDIA_SERVICE_URL: http://media-service:3000
      CANDIDATE_SERVICE_URL: http://candidate-service:3001
      INTERVIEW_SERVICE_URL: http://interview-service:3002
      EVALUATION_SERVICE_URL: http://evaluation-service:3003
      FEEDBACK_SERVICE_URL: http://feedback-service:3004
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 300
      JSON_BODY_LIMIT: 10mb
      DEFAULT_PROXY_TIMEOUT_MS: 120000
      MEDIA_PROXY_TIMEOUT_MS: 300000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    command: npm start

  frontend:
    build:
      context: ./frontend
    container_name: mic-frontend
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  gcs_data:
  temp_uploads:
  evaluation_tmp:
