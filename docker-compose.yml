services:
  postgres:
    image: postgres:16-alpine
    container_name: mic-postgres
    environment:
      POSTGRES_DB: media_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mic-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gcs-emulator:
    image: fsouza/fake-gcs-server:1.52.2
    container_name: mic-gcs-emulator
    command: ["-scheme", "http", "-external-url", "http://localhost:4443", "-port", "4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcs_data:/data

  media-service:
    build:
      context: ./media-service
    container_name: mic-media-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gcs-emulator:
        condition: service_started
    env_file:
      - ./media-service/.env.example
    environment:
      PORT: 3000
      NODE_ENV: development
      SERVICE_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=public
      REDIS_URL: redis://redis:6379
      GCS_PROJECT_ID: local-media-project
      GCS_BUCKET_NAME: media-assets
      GCS_EMULATOR_HOST: http://gcs-emulator:4443
      TEMP_UPLOAD_DIR: /app/tmp/uploads
    ports:
      - "3000:3000"
    volumes:
      - ./media-service:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm start"

  media-worker:
    build:
      context: ./media-service
    container_name: mic-media-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gcs-emulator:
        condition: service_started
    env_file:
      - ./media-service/.env.example
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_service?schema=public
      REDIS_URL: redis://redis:6379
      GCS_PROJECT_ID: local-media-project
      GCS_BUCKET_NAME: media-assets
      GCS_EMULATOR_HOST: http://gcs-emulator:4443
      TEMP_UPLOAD_DIR: /app/tmp/uploads
      SERVICE_BASE_URL: http://localhost:3000
    volumes:
      - ./media-service:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run prisma:deploy && npm run worker"

volumes:
  postgres_data:
  gcs_data:
